<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harcama Takip - Kayıt Ol</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div class="register-container">
        <div class="register-card">
            <h2>Yeni Kayıt</h2>
            <p>Harcamalarını takip etmeye başlamak için hesap oluştur.</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Kullanıcı Adı</label>
                    <input type="text" id="username" placeholder="Örn: alikodal">
                    <span id="usernameError" class="error-text"></span>
                </div>

                <div class="form-group">
                    <label for="email">E-posta</label>
                    <input type="email" id="email" placeholder="ornek@mail.com">
                    <span id="emailError" class="error-text"></span>
                </div>

                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" placeholder="En az 6 karakter">
                    <span id="passwordError" class="error-text"></span>
                </div>

                <button type="submit" class="btn-register">Kayıt Ol</button>
            </form>
            
            <p class="footer-text">Zaten hesabın var mı? <a href="login.html">Giriş Yap</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
