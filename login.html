<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harcama Takip - Giriş yap</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="login-container">
        <div class="login-card">
            <h2>Giriş Yap</h2>
            <p>Harcamalarını takip etmeye başlamak için hesabına giriş yap.</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Kullanıcı Adı</label>
                    <input type="text" id="username" placeholder="Örn: alikodal">
                    <span id="usernameError" class="error-text"></span>
                </div>

                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="login-password" placeholder="En az 6 karakter">
                    <span id="passwordError" class="error-text"></span>
                </div>

                <button type="submit" class="btn-login">Giriş yap</button>
            </form>
 
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
